{% extends "base.html" %}

{% block content %}

<h2>Categories</h2>

<ul class="card">
    {% for category in categories %}
        <li>
            <a href="{% url 'blogs-by-category' category.slug %}">
                {{ category.name }}
            </a>
        </li>
    {% empty %}
        <div class="empty-state">No categories yet</div>
    {% endfor %}
</ul>

{% endblock %}
