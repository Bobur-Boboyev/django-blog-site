{% extends "base.html" %}

{% block content %}

<h2>Liked Posts</h2>

{% for blog in blogs %}
    <div class="card">
        <a href="{% url 'blog-detail' blog.id %}">
            <h3>{{ blog.title }}</h3>
        </a>
    </div>
{% empty %}
    <div class="empty-state">
        You haven't liked any posts yet
    </div>
{% endfor %}

{% endblock %}
