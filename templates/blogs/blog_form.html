{% extends "base.html" %}

{% block content %}

<div class="form-page">

    <div class="form-card">

        <h1 class="form-title">Create Your Blog</h1>

        <p class="form-subtitle">
            Share your thoughts with the world.
        </p>

        <form method="POST" class="blog-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Publish
            </button>
        </form>

    </div>

</div>

{% endblock content %}
