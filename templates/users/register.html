{% extends "base.html" %}

{% block content %}

<div class="auth-page">

    <div class="auth-card">

        <h1 class="auth-title">Create Account</h1>

        <p class="auth-subtitle">
            Join and start sharing your ideas
        </p>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-fields">
                {{ form.as_p }}
            </div>

            <button class="btn btn-primary auth-btn">
                Register
            </button>

        </form>

    </div>

</div>

{% endblock %}
